name: CI
run-name: CI/CD RUN ${{ github.ref_name }}
on:
  push:
    branches:
    - develop
    - staging
    - master
    - ephemeral-*

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-types:
    uses: ./.github/workflows/generate-types.yml
  frontend:
    # Skip on ephemeral-* deploys — only generate-types + build + deploy run there.
    if: ${{ !startsWith(github.ref_name, 'ephemeral-') }}
    needs: [generate-types]
    uses: ./.github/workflows/frontend-checks.yml
  lint:
    if: ${{ !startsWith(github.ref_name, 'ephemeral-') }}
    uses: ./.github/workflows/lint.yml
  tests:
    if: ${{ !startsWith(github.ref_name, 'ephemeral-') }}
    needs: [generate-types]
    uses: ./.github/workflows/tests.yml
    secrets: inherit
  build:
    needs:
      - generate-types
      - lint
      - tests
      - frontend
    # Run once generate-types succeeds and no gate job FAILED. On ephemeral-*
    # the gate jobs are 'skipped' (not 'failure') so build proceeds; on real
    # branches a test failure flips this to skip build (and therefore deploy).
    if: ${{ !cancelled()
        && needs.generate-types.result == 'success'
        && needs.lint.result != 'failure'
        && needs.tests.result != 'failure'
        && needs.frontend.result != 'failure' }}
    uses: ./.github/workflows/build-and-push.yml
    secrets: inherit
  # trivy:
  #   runs-on: ubuntu-latest
  #   needs: [ build ]
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v6
  #     - name: DockerHub login
  #       uses: docker/login-action@v4
  #       with:
  #         username: ${{ secrets.DOCKERHUB_USERNAME }}
  #         password: ${{ secrets.DOCKERHUB_TOKEN }}
  #     - name: Run Trivy vulnerability scanner
  #       continue-on-error: true # due to getting TOOMANYREQUESTS
  #       uses: aquasecurity/trivy-action@0.35.0
  #       with:
  #         image-ref: '${{ vars.DOCKERHUB_ORGANIZATION }}/hope-support-images:core-${{ github.sha }}'
  #         format: 'table'
  #         exit-code: '0'
  #         ignore-unfixed: true
  #         vuln-type: 'os,library'
  #         severity: 'CRITICAL,HIGH'
  deploy:
    uses: ./.github/workflows/cd.yml
    secrets: inherit
    needs:
      - build
