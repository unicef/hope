name: GENERATE_TYPES
permissions:
  contents: read
on:
  workflow_call:
jobs:
  generate-types:
    runs-on: ubuntu-latest
    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/aurora
      REP_DATABASE_URL: postgres://postgres:postgres@localhost:5432/aurora
      SECRET_KEY: ci-secret-key-for-schema-generation
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CACHE_ENABLED: "False"
      PYTHONPATH: ./src
      ELASTICSEARCH_SYNONYMS_FILE: ${{ github.workspace }}/src/data/synonyms.txt
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aurora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libjpeg-dev \
            zlib1g-dev \
            libpq-dev \
            python3-psycopg2 \
            python3-gdal \
            gdal-bin \
            libcairo2 \
            libcairo2-dev \
            libffi-dev \
            libgdk-pixbuf2.0-0 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            shared-mime-info

      - name: Install Python & UV
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
          prune-cache: false
          cache-local-path: ./uv-cache
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
          python-version: 3.14

      - name: Install dependencies
        run: uv sync --cache-dir ./uv-cache --frozen

      - name: Restore migrated DB cache
        id: db-cache
        uses: actions/cache@v4
        with:
          path: /tmp/aurora.sql
          key: pgdump-v1-${{ hashFiles('src/hope/apps/**/migrations/*.py', 'uv.lock') }}

      - name: Apply cached DB dump
        if: steps.db-cache.outputs.cache-hit == 'true'
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d aurora -v ON_ERROR_STOP=1 -f /tmp/aurora.sql

      - name: Run migrations (cache miss only)
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: uv run python manage.py migrate --run-syncdb

      - name: Dump DB for next run (cache miss only)
        if: steps.db-cache.outputs.cache-hit != 'true'
        env:
          PGPASSWORD: postgres
        run: pg_dump -h localhost -U postgres -d aurora --no-owner --no-privileges > /tmp/aurora.sql

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
        working-directory: src/frontend

      - run: bun run generate-rest-api-types-camelcase
        working-directory: src/frontend

      - name: Upload generated types
        uses: actions/upload-artifact@v4
        with:
          name: restgenerated-types
          path: src/frontend/src/restgenerated/

      - run: bun run build
        working-directory: src/frontend
