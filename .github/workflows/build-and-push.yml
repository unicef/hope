name: Build
on:
  workflow_call:
permissions:
  contents: read
jobs:
  build_and_push:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Checkout code
        uses: actions/checkout@v6
      - name: DockerHub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Branch Name
        id: branch_name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
          fi

      - name: Extract build metadata
        run: |
          version=$(python3 -c "import sys; version=None; [version:=line.split('=')[1].strip().strip('\"') for line in open('pyproject.toml', 'r') if line.strip().startswith('version =')]; print(version if version else sys.exit(1))")
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Push dist
        env:
          SOURCE_COMMIT: ${{ github.sha }}
          DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORGANIZATION }}
          GIT_REF: ${{ github.ref }}
        run: |
          docker buildx create --use
          tags="-t ${DOCKERHUB_ORG}/hope-support-images:core-${SOURCE_COMMIT}-dist \
            -t ${DOCKERHUB_ORG}/hope-support-images:core-${SOURCE_COMMIT}"

          if [ -n "${BRANCH_NAME}" ]; then
            tags="$tags -t ${DOCKERHUB_ORG}/hope-support-images:core-${BRANCH_NAME}-latest-dist"
          fi

          if [ "${GIT_REF}" = "refs/heads/master" ]; then
            tags="$tags -t ${DOCKERHUB_ORG}/hope:core-${VERSION}"
          fi

          docker buildx build \
            --progress=plain \
            --cache-from type=registry,ref=${DOCKERHUB_ORG}/hope-support-images:cache-core-${SOURCE_COMMIT}-v2-dist \
            --cache-from type=registry,ref=${DOCKERHUB_ORG}/hope-support-images:cache-core-latest-v2-dist \
            --cache-from type=registry,ref=${DOCKERHUB_ORG}/hope-support-images:cache-core-latest-v2-dev \
            --cache-to type=registry,ref=${DOCKERHUB_ORG}/hope-support-images:cache-core-${SOURCE_COMMIT}-v2-dist,mode=max \
            --cache-to type=registry,ref=${DOCKERHUB_ORG}/hope-support-images:cache-core-latest-v2-dist,mode=max \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg SOURCE_COMMIT="${SOURCE_COMMIT}" \
            --build-arg BRANCH="${BRANCH_NAME}" \
            --build-arg VERSION="${VERSION}" \
            $tags \
            -f ./docker/Dockerfile \
            --target dist \
            --push ./
